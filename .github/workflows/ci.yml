name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest tag that looks like a semver (vX.Y.Z)
          latest=$(gh release list --limit 20 --json tagName \
            -q '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | .[0].tagName' \
            2>/dev/null)

          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            latest="v0.0.0"
          fi

          version="${latest#v}"
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          next="v${major}.${minor}.$((patch + 1))"
          echo "tag=${next}" >> $GITHUB_OUTPUT
          echo "Next version: ${next}"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project PremiereProTimelineQuickLook.xcodeproj \
            -scheme PremiereProTimelineQuickLook \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            build

      - name: Zip app
        run: |
          zip -r PeekPro.zip \
            build/Build/Products/Release/PeekPro.app

      - name: Write release notes
        run: |
          cat > notes.md << EOF
          ## 🎬 PeekPro ${{ steps.version.outputs.tag }}

          Built from commit [\`${GITHUB_SHA::7}\`](https://github.com/asxrow66/PeekPro/commit/${GITHUB_SHA}).

          > ⚠️ **This build is unsigned.** macOS Gatekeeper will block it.
          > For a working install, [build from source](https://github.com/asxrow66/PeekPro#-build-from-source-recommended) with your own Apple Developer certificate.

          ### 📦 What's included
          - \`PeekPro.zip\` — compiled \`.app\` bundle (unsigned, for reference)

          ### 🔧 Install from source
          \`\`\`bash
          git clone https://github.com/asxrow66/PeekPro.git
          cd PeekPro
          make install TEAM=<YourTeamID>
          \`\`\`
          EOF

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            PeekPro.zip \
            --title "PeekPro ${{ steps.version.outputs.tag }}" \
            --notes-file notes.md
